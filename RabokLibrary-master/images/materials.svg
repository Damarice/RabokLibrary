<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f0"/>
  
  <!-- Crystal lattice structure -->
  <g opacity="0.4">
    <!-- Hexagonal pattern -->
    <polygon points="100,30 130,50 130,90 100,110 70,90 70,50" fill="none" stroke="#6b6b6b" stroke-width="1.5"/>
    <polygon points="70,50 100,30 130,50 160,70 130,90 100,110 70,90 40,70" fill="none" stroke="#6b6b6b" stroke-width="1"/>
    <polygon points="40,70 70,50 70,90 40,110 10,90 10,50" fill="none" stroke="#6b6b6b" stroke-width="1"/>
    <polygon points="160,70 190,50 190,90 160,110 130,90 130,50" fill="none" stroke="#6b6b6b" stroke-width="1"/>
  </g>
  
  <!-- Atomic nodes -->
  <circle cx="100" cy="70" r="3" fill="#9a9a9a"/>
  <circle cx="70" cy="70" r="3" fill="#9a9a9a"/>
  <circle cx="130" cy="70" r="3" fill="#9a9a9a"/>
  <circle cx="85" cy="90" r="3" fill="#9a9a9a"/>
  <circle cx="115" cy="90" r="3" fill="#9a9a9a"/>
  
  <!-- Central icon -->
  <circle cx="100" cy="100" r="25" fill="none" stroke="#6b6b6b" stroke-width="2" opacity="0.5"/>
  <text x="100" y="108" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#6b6b6b">🔬</text>
</svg>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f0"/>
  
  <!-- Data visualization elements -->
  <circle cx="50" cy="150" r="8" fill="#9a9a9a" opacity="0.6"/>
  <circle cx="80" cy="120" r="8" fill="#9a9a9a" opacity="0.6"/>
  <circle cx="110" cy="100" r="8" fill="#9a9a9a" opacity="0.6"/>
